<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuraGen Bot Status</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Plus+Jakarta+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080710;
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #9d4edd;
            --primary-glow: rgba(157, 78, 221, 0.5);
            --secondary: #00f5d4;
            --secondary-glow: rgba(0, 245, 212, 0.5);
            --text-color: #f8f9fa;
            --text-muted: #adb5bd;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-hidden: relative;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(157, 78, 221, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 245, 212, 0.12) 0%, transparent 40%);
        }

        /* Ambient background glowing blobs */
        .glowing-blob {
            position: absolute;
            width: 300px;
            height: 300px;
            border-radius: 50%;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite alternate ease-in-out;
        }

        .blob-1 {
            top: 20%;
            left: 20%;
            background: var(--primary);
        }

        .blob-2 {
            bottom: 20%;
            right: 20%;
            background: var(--secondary);
            animation-delay: -5s;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.2); }
        }

        /* Glassmorphism Card Container */
        .container {
            width: 90%;
            max-width: 650px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            text-align: center;
            animation: fadeIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Header Style */
        header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 30%, var(--primary) 70%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        header p {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 30px;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            background: rgba(0, 245, 212, 0.1);
            border: 1px solid rgba(0, 245, 212, 0.3);
            color: var(--secondary);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 35px;
            box-shadow: 0 0 15px rgba(0, 245, 212, 0.1);
        }

        .status-badge .dot {
            width: 8px;
            height: 8px;
            background-color: var(--secondary);
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 8px var(--secondary);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }

        /* Info Grid */
        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 35px;
        }

        .info-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .info-card:hover {
            transform: translateY(-5px);
            border-color: rgba(157, 78, 221, 0.3);
            background: rgba(255, 255, 255, 0.04);
        }

        .info-card h3 {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-card p {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-color);
        }

        /* Action Buttons */
        .cta-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            background: linear-gradient(135deg, var(--primary) 0%, #7b2cbf 100%);
            color: white;
            text-decoration: none;
            padding: 16px;
            border-radius: 14px;
            font-weight: 700;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px var(--primary-glow);
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(157, 78, 221, 0.8);
            background: linear-gradient(135deg, #ae2012 0%, var(--primary) 100%); /* Neon shift effect */
            background: linear-gradient(135deg, #b5179e 0%, var(--primary) 100%);
        }

        /* Footer styling */
        footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        footer a {
            color: var(--secondary);
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="glowing-blob blob-1"></div>
    <div class="glowing-blob blob-2"></div>

    <div class="container">
        <header>
            <h1>AuraGen Bot</h1>
            <p>24/7 AI Image Generation Assistant</p>
        </header>

        <div class="status-badge">
            <span class="dot"></span>
            ACTIVE & ONLINE
        </div>

        <div class="info-grid">
            <div class="info-card">
                <h3>Image Generator</h3>
                <p>FLUX.1-schnell</p>
            </div>
            <div class="info-card">
                <h3>Prompt Enhancer</h3>
                <p>Groq Llama-3</p>
            </div>
            <div class="info-card">
                <h3>Webhook Mode</h3>
                <p>Auto-Wake Enabled</p>
            </div>
            <div class="info-card">
                <h3>Hosted On</h3>
                <p>Hugging Face Spaces</p>
            </div>
        </div>

        <button onclick="window.open('https://t.me/AuraGenImageBot', '_blank')" class="cta-btn">
            💬 Open Bot on Telegram
        </button>

        <footer>
            Powered by Hugging Face & Groq • <a href="https://huggingface.co/spaces/Bommagoni/image" target="_blank">View Repository</a>
        </footer>
    </div>
</body>
</html>
